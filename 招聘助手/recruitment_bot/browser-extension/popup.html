<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招聘助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 420px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f7fa;
      color: #1f2933;
    }
    .header {
      background: #123b3b;
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 16px; font-weight: 650; }
    .version {
      font-size: 11px;
      opacity: 0.85;
      background: rgba(255,255,255,0.16);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .panel {
      background: white;
      margin: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 14px;
      box-shadow: 0 1px 6px rgba(15, 23, 42, 0.05);
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f2f5;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #64748b; font-size: 12px; white-space: nowrap; }
    .value {
      color: #111827;
      font-size: 13px;
      font-weight: 650;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }
    .value.ok { color: #0f766e; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 12px;
    }
    .stat-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-number {
      font-size: 22px;
      font-weight: 750;
      color: #0f766e;
      line-height: 1.1;
    }
    .stat-label {
      margin-top: 5px;
      color: #64748b;
      font-size: 11px;
    }
    .notice {
      margin: 0 12px 12px;
      background: #f0fdfa;
      border: 1px solid #ccfbf1;
      border-radius: 8px;
      padding: 10px 12px;
      color: #115e59;
      font-size: 12px;
      line-height: 1.55;
    }
    .btn {
      width: 100%;
      min-height: 38px;
      border: 1px solid #d8e0ea;
      border-radius: 7px;
      background: white;
      color: #172033;
      font-weight: 650;
      cursor: pointer;
    }
    .btn:hover { background: #f8fafc; }
    .btn.primary {
      background: #ffee00;
      border-color: #111827;
      color: #111827;
      margin-bottom: 10px;
    }
    .btn.primary:hover { background: #e6d600; }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    .field label {
      color: #64748b;
      font-size: 12px;
    }
    .field input {
      width: 100%;
      min-height: 34px;
      border: 1px solid #d8e0ea;
      border-radius: 7px;
      padding: 7px 9px;
      font: inherit;
      color: #111827;
    }
    .log-body {
      max-height: 150px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.7;
      color: #475569;
    }
    .log-entry {
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 8px;
      padding: 2px 0;
    }
    .log-time { color: #94a3b8; white-space: nowrap; }
    .empty-state {
      text-align: center;
      padding: 18px 0;
      color: #94a3b8;
      font-size: 12px;
    }
    .footer {
      text-align: center;
      padding: 4px 12px 12px;
      font-size: 11px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>招聘助手</h1>
    <span class="version">v2.1</span>
  </div>

  <div class="panel">
    <div class="row">
      <span class="label">安全状态</span>
      <span class="value ok" id="safetyStatus">正常</span>
    </div>
    <div class="row">
      <span class="label">账号信息</span>
      <span class="value" id="accountName">打开招聘页面后自动识别</span>
    </div>
    <div class="field">
      <label for="accountNameInput">手动账号信息</label>
      <input id="accountNameInput" type="text" placeholder="填写 BOSS 招聘账号姓名" />
    </div>
    <button class="btn" id="btnSaveAccount">保存账号信息</button>
    <div class="row">
      <span class="label">Web 后台</span>
      <span class="value" id="backendStatus">未检测</span>
    </div>
  </div>

  <div class="notice">
    点击一键开始后，插件会按岗位要求库评估候选人，匹配度达标再求简历。连接、推送、问答、定时任务和行为节奏在 Web 管理后台配置。
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-number" id="totalResumes">0</div>
      <div class="stat-label">候选人</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="todayResumes">0</div>
      <div class="stat-label">今日新增</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="recommendedCount">0</div>
      <div class="stat-label">推荐</div>
    </div>
  </div>

  <div class="panel">
    <button class="btn primary" id="btnStartTask">一键开始执行任务</button>
    <button class="btn" id="btnOpenWebAdmin">打开 Web 管理后台</button>
  </div>

  <div class="panel">
    <div class="row">
      <span class="label">最近运行日志</span>
      <span class="value" id="logCount">0 条</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="empty-state">暂无日志记录</div>
    </div>
  </div>

  <div class="footer">招聘助手 · Web 后台统一配置</div>
  <script src="popup.js"></script>
</body>
</html>
