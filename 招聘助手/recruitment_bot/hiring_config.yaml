# 招聘助手配置文件
# 版本: 2.0.0
# 说明: 此配置文件用于招聘助手系统的各项参数设置

# ============================================================
# 招聘流程阶段
# ============================================================
process:
  - sourcing          # 人才寻源
  - screening         # 简历筛选
  - phone_screen      # 电话初筛
  - interview         # 面试
  - offer             # 发放Offer
  - onboarding        # 入职
  - closed            # 已关闭

# ============================================================
# 面试类型
# ============================================================
interview_types:
  - technical         # 技术面试
  - behavioral        # 行为面试
  - system_design     # 系统设计
  - culture_fit       # 文化契合

# ============================================================
# 评分配置
# ============================================================
scoring:
  weights:
    technical_skills: 0.30    # 技术能力权重
    problem_solving: 0.25     # 问题解决能力权重
    communication: 0.15       # 沟通能力权重
    collaboration: 0.15       # 协作能力权重
    growth_mindset: 0.15      # 成长心态权重

  pass_threshold: 3.0         # 录用通过阈值
  strong_hire_threshold: 4.0  # 强烈推荐录用阈值

  # 评分标准说明
  scoring_guide:
    5: "卓越 - 前5%的候选人"
    4: "优秀 - 明显高于标准"
    3: "达标 - 可以录用"
    2: "不足 - 存在重大疑虑"
    1: "不合格 - 明确不录用"

# ============================================================
# 招聘目标
# ============================================================
targets:
  time_to_hire_days: 45          # 目标招聘周期（天）
  offer_acceptance_rate: 0.80    # 目标Offer接受率
  retention_90_days: 0.95        # 90天留存率目标
  diversity_pipeline: 0.40       # 多元化管道比例

  # 红线指标
  red_flags:
    time_to_hire: 60             # 招聘周期超过60天为预警
    offer_acceptance: 0.60       # Offer接受率低于60%为预警
    retention_90_days: 0.85      # 90天留存率低于85%为预警

# ============================================================
# 通知配置
# ============================================================
notifications:
  stale_candidate_days: 7        # 候选人停滞预警天数
  offer_expiry_days: 5           # Offer有效期天数
  interview_reminder_hours: 24   # 面试提醒提前时间（小时）

# ============================================================
# 内部推荐激励
# ============================================================
internal_referral:
  rewards:
    normal: 2000                 # 普通岗位（HC=1）
    medium: 3000                 # 中批量岗位（HC=2-3）
    large: 5000                  # 大批量岗位（HC>=6）
    critical: 8000               # 高难度岗位（CTO/CFO等）

  channel_ratio:
    internal: 0.30               # 内部推荐占比30%
    external: 0.70               # 外部渠道占比70%

  conversion_rates:
    internal: 0.0762             # 内部推荐转化率7.62%
    external: 0.0603             # 外部渠道转化率6.03%
