services:
  recruitment-web-admin:
    image: ${IMAGE_NAME:-ghcr.io/m15701162024-afk/hrassistant/recruitment-web-admin}:${IMAGE_TAG:-latest}
    container_name: recruitment-web-admin
    restart: unless-stopped
    ports:
      - "${RECRUITMENT_PORT:-8787}:8787"
    volumes:
      - recruitment_data:/data
    environment:
      RECRUITMENT_HOST: 0.0.0.0
      RECRUITMENT_PORT: 8787
      RECRUITMENT_DB: /data/recruitment_history.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  recruitment_data:
