services:
  recruitment-web-admin:
    build:
      context: ..
      dockerfile: web_admin/Dockerfile
    container_name: recruitment-web-admin
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data
    environment:
      RECRUITMENT_HOST: 0.0.0.0
      RECRUITMENT_PORT: 8787
      RECRUITMENT_DB: /data/recruitment_history.db
      RECRUITMENT_IP_ALLOWLIST: 127.0.0.1/32,::1/128,10.100.60.0/23
      RECRUITMENT_TRUST_PROXY_HEADERS: "1"
      RECRUITMENT_MAX_BODY_BYTES: "2097152"
      RECRUITMENT_RATE_LIMIT_PER_MINUTE: "120"
